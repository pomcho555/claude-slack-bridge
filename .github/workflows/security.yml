name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC — catch newly-disclosed advisories.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  # Secret hygiene: the app handles xoxb-/xapp- tokens and ships .env.example.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  # SCA over the whole repo (filesystem). Fails the job on HIGH/CRITICAL.
  # NOTE: SARIF -> GitHub code scanning needs GitHub Advanced Security, which a
  # private repo doesn't have by default, so this gates directly on exit code
  # instead of uploading SARIF. Switch to format:sarif + upload-sarif if GHAS is
  # enabled.
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  # NOTE: GitHub's dependency-review-action is intentionally omitted — it
  # requires GitHub Advanced Security (Dependency Graph), which a private repo
  # doesn't have, so it errors on PRs. The cargo-deny + cargo-audit (e2e) gates
  # cover dependency vulnerabilities instead.

  # Rust dependency vuln/license/source gate (the failing CI gate; Dependabot
  # alone only notifies, it does not block).
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: Cargo.toml
          command: check advisories bans licenses sources

  # SBOM (CycloneDX) saved as an artifact for impact analysis / audit.
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json
