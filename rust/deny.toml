# cargo-deny policy for the Rust port. Gates dependency vulnerabilities,
# licenses, banned crates and sources. CI fails on any RustSec advisory; triage
# false positives by adding an entry to [advisories].ignore with a comment.
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses we accept (the project is MIT).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# Only crates.io.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
